name: Compile and test the app

on:
  workflow_dispatch:

defaults:
  run:
    shell: "bash"

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_fund: false
  USE_HARD_LINKS: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile-and-test:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - macos-15-intel
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: "AbdulrhmanGoni/denokv-gui-client"
          ref: "main"

      - uses: actions/checkout@v6
        with:
          path: "./this"
          
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run compile -- -p never

      - name: Patch
        run: cp ./this/patch.ts tests/e2e.spec.ts

      - name: Run UI e2e tests
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run test
          else
            npm run test
          fi
